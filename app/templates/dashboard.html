<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <header class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between shadow">
    <h1 class="text-2xl font-bold tracking-tight">User Dashboard</h1>
    <button onclick="openCreate()"
      class="bg-white text-indigo-700 font-semibold px-4 py-2 rounded hover:bg-indigo-50 transition">
      + New User
    </button>
  </header>

  <main class="flex gap-6 p-6">

    <!-- User list -->
    <section class="flex-1 bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-indigo-50 text-indigo-800 uppercase text-xs font-semibold">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Nombre</th>
            <th class="px-4 py-3 text-left">Apellido</th>
            <th class="px-4 py-3 text-left">Rol</th>
            <th class="px-4 py-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="user-list" class="divide-y divide-gray-100"></tbody>
      </table>
      <p id="empty-msg" class="hidden text-center text-gray-400 py-10">No users found.</p>
    </section>

    <!-- Detail / form panel -->
    <aside id="panel" class="hidden w-80 bg-white rounded-xl shadow p-6 self-start">
      <div class="flex items-center justify-between mb-4">
        <h2 id="panel-title" class="text-lg font-semibold text-gray-800"></h2>
        <button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>

      <!-- Detail view -->
      <div id="detail-view">
        <dl class="space-y-3 text-sm">
          <div>
            <dt class="text-gray-500 font-medium">ID</dt>
            <dd id="d-id" class="text-gray-900 mt-0.5"></dd>
          </div>
          <div>
            <dt class="text-gray-500 font-medium">Nombre</dt>
            <dd id="d-nombre" class="text-gray-900 mt-0.5"></dd>
          </div>
          <div>
            <dt class="text-gray-500 font-medium">Apellido</dt>
            <dd id="d-apellido" class="text-gray-900 mt-0.5"></dd>
          </div>
          <div>
            <dt class="text-gray-500 font-medium">Rol</dt>
            <dd id="d-rol" class="text-gray-900 mt-0.5"></dd>
          </div>
        </dl>
        <div class="flex gap-2 mt-6">
          <button onclick="openEdit(currentUser)"
            class="flex-1 bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition text-sm font-medium">
            Edit
          </button>
          <button onclick="deleteUser(currentUser.id)"
            class="flex-1 bg-red-500 text-white py-2 rounded hover:bg-red-600 transition text-sm font-medium">
            Delete
          </button>
        </div>
      </div>

      <!-- Create / Edit form -->
      <form id="user-form" class="hidden space-y-4" onsubmit="submitForm(event)">
        <input type="hidden" id="form-id" />
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Nombre</label>
          <input id="form-nombre" type="text" required
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Apellido</label>
          <input id="form-apellido" type="text" required
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Rol</label>
          <input id="form-rol" type="text" required
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <p id="form-error" class="hidden text-red-500 text-xs"></p>
        <div class="flex gap-2">
          <button type="submit"
            class="flex-1 bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition text-sm font-medium">
            Save
          </button>
          <button type="button" onclick="cancelForm()"
            class="flex-1 border border-gray-300 text-gray-600 py-2 rounded hover:bg-gray-50 transition text-sm font-medium">
            Cancel
          </button>
        </div>
      </form>
    </aside>

  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 hidden bg-gray-800 text-white text-sm px-4 py-3 rounded shadow-lg"></div>

  <script>
    let currentUser = null;
    let formMode = null; // 'create' | 'edit'

    async function loadUsers() {
      const res = await fetch('/users');
      const users = await res.json();
      const tbody = document.getElementById('user-list');
      const empty = document.getElementById('empty-msg');
      tbody.innerHTML = '';
      if (users.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-indigo-50 cursor-pointer transition';
        tr.innerHTML = `
          <td class="px-4 py-3 text-gray-500">${u.id}</td>
          <td class="px-4 py-3 font-medium text-gray-800">${u.nombre}</td>
          <td class="px-4 py-3 text-gray-700">${u.apellido}</td>
          <td class="px-4 py-3">
            <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full text-xs font-medium">${u.rol}</span>
          </td>
          <td class="px-4 py-3">
            <button onclick="event.stopPropagation(); openEdit(${JSON.stringify(u).replace(/"/g, '&quot;')})"
              class="text-indigo-500 hover:text-indigo-700 mr-3 text-xs font-medium">Edit</button>
            <button onclick="event.stopPropagation(); deleteUser(${u.id})"
              class="text-red-400 hover:text-red-600 text-xs font-medium">Delete</button>
          </td>`;
        tr.addEventListener('click', () => showDetail(u));
        tbody.appendChild(tr);
      });
    }

    function showDetail(u) {
      currentUser = u;
      document.getElementById('panel-title').textContent = `${u.nombre} ${u.apellido}`;
      document.getElementById('d-id').textContent = u.id;
      document.getElementById('d-nombre').textContent = u.nombre;
      document.getElementById('d-apellido').textContent = u.apellido;
      document.getElementById('d-rol').textContent = u.rol;
      document.getElementById('detail-view').classList.remove('hidden');
      document.getElementById('user-form').classList.add('hidden');
      document.getElementById('panel').classList.remove('hidden');
    }

    function openCreate() {
      formMode = 'create';
      document.getElementById('panel-title').textContent = 'New User';
      document.getElementById('form-id').value = '';
      document.getElementById('form-nombre').value = '';
      document.getElementById('form-apellido').value = '';
      document.getElementById('form-rol').value = '';
      document.getElementById('form-error').classList.add('hidden');
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('user-form').classList.remove('hidden');
      document.getElementById('panel').classList.remove('hidden');
    }

    function openEdit(u) {
      formMode = 'edit';
      currentUser = u;
      document.getElementById('panel-title').textContent = 'Edit User';
      document.getElementById('form-id').value = u.id;
      document.getElementById('form-nombre').value = u.nombre;
      document.getElementById('form-apellido').value = u.apellido;
      document.getElementById('form-rol').value = u.rol;
      document.getElementById('form-error').classList.add('hidden');
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('user-form').classList.remove('hidden');
      document.getElementById('panel').classList.remove('hidden');
    }

    function cancelForm() {
      if (currentUser) showDetail(currentUser);
      else closePanel();
    }

    function closePanel() {
      document.getElementById('panel').classList.add('hidden');
      currentUser = null;
    }

    async function submitForm(e) {
      e.preventDefault();
      const body = {
        nombre: document.getElementById('form-nombre').value.trim(),
        apellido: document.getElementById('form-apellido').value.trim(),
        rol: document.getElementById('form-rol').value.trim(),
      };
      const id = document.getElementById('form-id').value;
      const url = formMode === 'edit' ? `/users/${id}` : '/users';
      const method = formMode === 'edit' ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) {
        const err = document.getElementById('form-error');
        err.textContent = data.error || 'Error saving user.';
        err.classList.remove('hidden');
        return;
      }
      toast(formMode === 'edit' ? 'User updated.' : 'User created.');
      closePanel();
      await loadUsers();
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      const res = await fetch(`/users/${id}`, { method: 'DELETE' });
      if (res.ok) {
        toast('User deleted.');
        closePanel();
        await loadUsers();
      }
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 2500);
    }

    loadUsers();
  </script>
</body>
</html>
